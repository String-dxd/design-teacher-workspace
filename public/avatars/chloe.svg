<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Chloe avatar — crayon-doodle style after the supplied artwork: black
       outlined face, swooping fringe with high side ponytail and orange
       scrunchie, blue vest over white collar with striped tie. -->
  <defs>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.6"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#F1F1F0"/>
  <g filter="url(#rough)">
    <!-- shirt / arms -->
    <path d="M28 200 Q32 170 60 159 L132 159 Q160 170 164 200 Z" fill="#FFFFFF" stroke="#151515" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- vest -->
    <path d="M56 200 L56 176 Q58 162 70 159 L96 182 L122 159 Q134 162 136 176 L136 200 Z" fill="#2F6BEA" stroke="#151515" stroke-width="3" stroke-linejoin="round"/>
    <!-- neck -->
    <rect x="87" y="138" width="18" height="24" fill="#FFFFFF"/>
    <path d="M87 140 L87 160 M105 140 L105 160" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <!-- collar -->
    <path d="M78 154 L96 176 L86 150 Z" fill="#FFFFFF" stroke="#151515" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M114 154 L96 176 L106 150 Z" fill="#FFFFFF" stroke="#151515" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- tie -->
    <path d="M91 170 L101 170 L105 190 L96 199 L87 190 Z" fill="#F0662E" stroke="#151515" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M90 178 L102 174 M92 187 L104 183" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- ponytail -->
    <path d="M130 60 Q172 42 174 92 Q175 128 160 152 Q152 158 150 148 Q162 116 154 86 Q149 66 128 64 Z" fill="#151515"/>
    <!-- scrunchie -->
    <rect x="123" y="42" width="13" height="22" rx="6.5" fill="#F0662E" transform="rotate(-24 129 53)"/>
    <!-- ears -->
    <circle cx="49" cy="106" r="9" fill="#FFFFFF" stroke="#151515" stroke-width="3"/>
    <circle cx="143" cy="106" r="9" fill="#FFFFFF" stroke="#151515" stroke-width="3"/>
    <!-- face -->
    <path d="M50 102 Q50 58 96 56 Q142 58 142 102 Q142 144 96 148 Q50 144 50 102 Z" fill="#FFFFFF" stroke="#151515" stroke-width="3.5"/>
    <!-- fringe -->
    <path d="M48 110 Q40 50 96 44 Q142 46 146 92 Q147 102 144 110 Q144 80 120 70 Q128 88 110 82 Q86 72 70 88 Q56 98 54 116 Q50 116 48 110 Z" fill="#151515"/>
    <!-- side strands -->
    <path d="M50 100 Q44 128 52 148 Q57 152 58 145 Q52 124 56 104 Z" fill="#151515"/>
    <path d="M142 100 Q148 126 141 146 Q136 151 135 143 Q141 122 137 104 Z" fill="#151515"/>
    <!-- brows -->
    <path d="M72 92 Q80 87 89 91" fill="none" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <path d="M104 91 Q112 87 121 92" fill="none" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <!-- eyes -->
    <circle cx="80" cy="106" r="4.5" fill="#151515"/>
    <circle cx="114" cy="106" r="4.5" fill="#151515"/>
    <!-- nose -->
    <path d="M97 108 L96 117" stroke="#151515" stroke-width="3" stroke-linecap="round"/>
    <!-- blush -->
    <path d="M64 118 Q69 115 74 118" fill="none" stroke="#F2997E" stroke-width="4" stroke-linecap="round"/>
    <path d="M118 118 Q123 115 128 118" fill="none" stroke="#F2997E" stroke-width="4" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M87 127 Q96 135 106 127" fill="none" stroke="#D9432A" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
